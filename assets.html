<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Assets</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{background:#0e0e0e;color:#fff;font-family:'JetBrains Mono',monospace;padding:40px;display:flex;flex-direction:column;align-items:center;gap:40px}
h2{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#D45F3C;margin-bottom:8px}
p.note{font-size:11px;color:#666;margin-bottom:12px}
.wrap{display:flex;flex-direction:column;align-items:center}
.dl{margin-top:12px;padding:10px 28px;background:#D45F3C;color:#FFF9F0;border:none;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;cursor:pointer}
.dl:hover{background:#e8734f}
#s{color:#D45F3C;font-size:14px;margin-bottom:20px}

/* Use the ACTUAL fonts in DOM elements instead of canvas */
.cover-container{width:1500px;height:500px;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.cover-title{font-family:'Instrument Serif',serif;font-size:80px;color:#FFF9F0;letter-spacing:-1px;line-height:1}
.cover-tagline{font-family:'JetBrains Mono',monospace;font-size:18px;color:#D45F3C;letter-spacing:1px;margin-top:18px;opacity:.9}
.cover-divider{width:180px;height:1px;background:#D45F3C;opacity:.25;margin-top:16px}
.cover-host{font-family:'JetBrains Mono',monospace;font-size:15px;color:#7a726b;letter-spacing:1px;margin-top:14px}

.spotify-container{width:600px;height:600px;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.spotify-fp{position:absolute;top:3%;left:50%;transform:translateX(-50%)}
.sp-title{font-family:'Instrument Serif',serif;font-size:56px;color:#FFF9F0;letter-spacing:-1px;line-height:1.1;text-align:center;position:relative;z-index:2;margin-top:160px}
.sp-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:#D45F3C;letter-spacing:3px;text-transform:uppercase;margin-top:14px;opacity:.8;position:relative;z-index:2;text-align:center}

.profile-container{width:400px;height:400px;background:#1A1A1A;display:flex;align-items:center;justify-content:center}

.scroll-wrap{max-width:100%;overflow-x:auto}
</style>
</head>
<body>
<div id="s">Waiting for fonts to load...</div>

<!-- Hidden SVG defs for fingerprint -->
<svg style="display:none"><defs>
<symbol id="fp-profile" viewBox="0 0 400 400">
<g transform="translate(200,200)">
<path d="M-90 0Q-90-116 0-116Q90-116 90 0Q90 105 0 105Q-90 105-90 0" stroke="#D45F3C" stroke-width="8" fill="none" opacity="0.3"/>
<path d="M-72 0Q-72-94 0-94Q72-94 72 0Q72 85 0 85Q-72 85-72 0" stroke="#D45F3C" stroke-width="8" fill="none" opacity="0.5"/>
<path d="M-54 0Q-54-70 0-70Q54-70 54 0Q54 63 0 63Q-54 63-54 0" stroke="#D45F3C" stroke-width="8" fill="none" opacity="0.7"/>
<path d="M-35 0Q-35-45 0-45Q35-45 35 0Q35 40 0 40Q-35 40-35 0" stroke="#D45F3C" stroke-width="8" fill="none" opacity="0.85"/>
<circle cx="0" cy="0" r="15" fill="#D45F3C"/>
</g>
</symbol>
<symbol id="fp-spotify" viewBox="0 0 300 380">
<g transform="translate(150,190)">
<path d="M-130 0Q-130-170 0-170Q130-170 130 0Q130 156 0 156Q-130 156-130 0" stroke="#D45F3C" stroke-width="3" fill="none" opacity="0.2"/>
<path d="M-104 0Q-104-136 0-136Q104-136 104 0Q104 124 0 124Q-104 124-104 0" stroke="#D45F3C" stroke-width="3" fill="none" opacity="0.3"/>
<path d="M-78 0Q-78-102 0-102Q78-102 78 0Q78 93 0 93Q-78 93-78 0" stroke="#D45F3C" stroke-width="3" fill="none" opacity="0.42"/>
<path d="M-52 0Q-52-68 0-68Q52-68 52 0Q52 62 0 62Q-52 62-52 0" stroke="#D45F3C" stroke-width="3" fill="none" opacity="0.58"/>
<path d="M-28 0Q-28-36 0-36Q28-36 28 0Q28 33 0 33Q-28 33-28 0" stroke="#D45F3C" stroke-width="3" fill="none" opacity="0.75"/>
<circle cx="0" cy="0" r="10" fill="#D45F3C" opacity="0.9"/>
</g>
</symbol>
</defs></svg>

<!-- PROFILE -->
<div class="wrap">
<h2>Profile</h2><p class="note">400×400</p>
<div class="profile-container" id="profile">
<svg width="340" height="340" viewBox="0 0 400 400"><use href="#fp-profile"/></svg>
</div>
<button class="dl" onclick="capture('profile',400,400,'twitter-profile-400x400')">Download PNG</button>
</div>

<!-- COVER -->
<div class="wrap">
<h2>Cover</h2><p class="note">1500×500</p>
<div class="scroll-wrap">
<div class="cover-container" id="cover">
<div class="cover-title">The Human Protocol</div>
<div class="cover-tagline">The personal side of building big things</div>
<div class="cover-divider"></div>
<div class="cover-host">hosted by Simona Pop</div>
</div>
</div>
<button class="dl" onclick="capture('cover',1500,500,'twitter-cover-1500x500')">Download PNG</button>
</div>

<!-- SPOTIFY -->
<div class="wrap">
<h2>Spotify</h2><p class="note">3000×3000 (downloads at full size)</p>
<div class="spotify-container" id="spotify">
<svg class="spotify-fp" width="300" height="380" viewBox="0 0 300 380"><use href="#fp-spotify"/></svg>
<div class="sp-title">The Human<br>Protocol</div>
<div class="sp-tag">The personal side of building big things</div>
</div>
<button class="dl" onclick="capture('spotify',3000,3000,'spotify-cover-3000x3000')">Download PNG</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
document.fonts.ready.then(function(){
  document.getElementById('s').textContent = 'Ready ✓ — Download your images';
  document.getElementById('s').style.color = '#4CAF50';
});
setTimeout(function(){
  var s = document.getElementById('s');
  if(s.style.color !== 'rgb(76, 175, 80)'){
    s.textContent = 'Ready — Download your images';
    s.style.color = '#4CAF50';
  }
}, 3000);

function capture(id, w, h, filename) {
  var el = document.getElementById(id);
  var scale = w / el.offsetWidth;
  
  html2canvas(el, {
    scale: scale,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#1A1A1A',
    logging: false,
    width: el.offsetWidth,
    height: el.offsetHeight,
    onclone: function(doc) {
      // Ensure fonts are available in cloned document
      var link = doc.createElement('link');
      link.href = 'https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap';
      link.rel = 'stylesheet';
      doc.head.appendChild(link);
    }
  }).then(function(canvas) {
    var a = document.createElement('a');
    a.download = filename + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
