<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#1A1A1A;--fg:#FFF9F0;--accent:#D45F3C;--muted:#7a726b;--serif:'Instrument Serif',Georgia,serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0}body{background:var(--bg);width:1500px;height:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.title{font-family:var(--serif);font-size:80px;color:var(--fg);letter-spacing:-2px;line-height:.95;font-weight:400}
.tag{font-family:var(--mono);font-size:18px;color:var(--accent);letter-spacing:1px;margin-top:22px;opacity:.9}
.line{width:180px;height:1px;background:var(--accent);opacity:.25;margin-top:18px}
.host{font-family:var(--mono);font-size:15px;color:var(--muted);letter-spacing:1px;margin-top:16px}
</style>
</head><body>
<div class="title">The Human Protocol</div>
<div class="tag">The personal side of building big things</div>
<div class="line"></div>
<div class="host">hosted by Simona Pop</div>
</body></html>
